# Local development database only.
# Production database (Milestone 3+) will be a managed Railway Postgres instance.
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: repeat-signal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repeat_signal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repeat_signal_dev}
      POSTGRES_DB: ${POSTGRES_DB:-repeat_signal}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
