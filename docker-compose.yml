# Local development database only.
# Production database (Milestone 10) will be a managed Neon Postgres instance.
# Plain postgres, not PostGIS -- see docs/ARCHITECTURE.md for why (all spatial
# computation happens offline in the data pipeline; the DB just serves precomputed
# GeoJSON, no live geospatial query engine needed).
services:
  db:
    image: postgres:16
    container_name: repeat-signal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repeat_signal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repeat_signal_dev}
      POSTGRES_DB: ${POSTGRES_DB:-repeat_signal}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
